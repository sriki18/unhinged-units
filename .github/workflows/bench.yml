name: codspeed-benchmarks

on:
  # Auto-triggers disabled until CODSPEED_TOKEN is configured for this fork.
  # Re-enable `push` / `pull_request` once the secret exists.
  workflow_dispatch:

jobs:
  benchmarks:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "numpy>=1.23,<2.0.0"

      - name: Install bench dependencies
        run: pip install .[codspeed]

      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4.11.1
        with:
          token: ${{ secrets.CODSPEED_TOKEN }}
          run: pytest . --codspeed
          mode: walltime
